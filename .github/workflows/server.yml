name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'rest-hub-server/**'
  pull_request:
    branches: [develop]
    paths:
      - 'rest-hub-server/**'
    types: [labeled]

jobs:
  build-and-push:
    if: contains(github.event.pull_request.labels.*.name, 'deploy') || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rest-hub-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Fetch .env from AWS Parameter Store
        run: |
          mkdir -p config
          aws ssm get-parameter \
            --with-decryption \
            --name PROD_REST_HUB_SERVER_CONFIG \
            --region ap-northeast-2 \
            | jq -r '.Parameter.Value' > config/.env

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build app
        run: yarn build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (with baked .env)
        uses: docker/build-push-action@v5
        with:
          context: ./rest-hub-server
          file: ./rest-hub-server/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Trigger Railway Deployment
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_API_TOKEN }}
          service: ${{ secrets.RAILWAY_SERVICE_ID }}
